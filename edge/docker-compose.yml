services:
  ast-service:
    # Disabled — AST produces ~5 AudioSet labels per sample, the main
    # source of Firestore write-quota pressure. We no longer use the
    # "Acoustic Environment" dashboard section it feeds. Re-enable by
    # running `docker compose --profile ast up -d ast-service`.
    profiles: ["ast"]
    build: ./ast-service
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DEVICE_NAME=AudioMoth
      - SAMPLE_RATE=256000
    volumes:
      - audio_lock:/locks
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  batdetect-service:
    build:
      context: ..
      dockerfile: edge/batdetect-service/Dockerfile
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DEVICE_NAME=AudioMoth
      # AudioMoth captures natively at 384 kHz (firmware 1.9.1). We ask
      # ALSA for 256 kHz so plughw does a single clean resample down to
      # BatDetect2's target_samp_rate (256 kHz). Setting this to 384000
      # would force BatDetect2 to do its own resample, an extra step for
      # no gain — all bat calls of interest are <120 kHz.
      - SAMPLE_RATE=256000
      # Matches training: BatDetect2 features were filtered at
      # det_prob > 0.5 when the classifier head was trained. Inference
      # uses the same threshold so classifier inputs stay in the
      # training distribution. See BATDETECT2_TRAINING.md section 1.
      - DETECTION_THRESHOLD=0.5
      - MIN_PREDICTION_CONF=${MIN_PREDICTION_CONF:-0.6}
      - SEGMENT_DURATION=15
      - HPF_ENABLED=${HPF_ENABLED:-true}
      - HPF_CUTOFF_HZ=${HPF_CUTOFF_HZ:-16000}
      - HPF_ORDER=${HPF_ORDER:-4}
      # Audio-level validator — final sanity check. Rejects segments
      # where the classifier confidently picked a class but the audio
      # itself is silence / broadband noise (e.g. the 0.0012-RMS file
      # that got through on 2026-04-20).
      - VALIDATOR_ENABLED=${VALIDATOR_ENABLED:-true}
      - VALIDATOR_MIN_RMS=${VALIDATOR_MIN_RMS:-0.005}
      - VALIDATOR_MIN_SNR_DB=${VALIDATOR_MIN_SNR_DB:-10.0}
      - VALIDATOR_MIN_BURST_RATIO=${VALIDATOR_MIN_BURST_RATIO:-3.0}
      - UPLOAD_BAT_AUDIO=false
      - ENABLE_GROUPS_CLASSIFIER=${ENABLE_GROUPS_CLASSIFIER:-false}
      - MODEL_PATH=/app/models/groups_model.pt
      - MODEL_VERSION=${MODEL_VERSION:-groups_v1_post_epfu_partial_2026-04-17}
      - ENABLE_STORAGE_TIERING=${ENABLE_STORAGE_TIERING:-false}
      - PI_SITE=${PI_SITE:-pi01}
    volumes:
      - audio_lock:/locks
      - bat_audio:/bat_audio
      - control_flags:/control
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  sync-service:
    build: ./sync-service
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - SYNC_INTERVAL=60
      - SAMPLE_RATE=256000
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=bat-edge-monitor.firebasestorage.app
      - UPLOAD_BAT_AUDIO=false
      - BAT_AUDIO_DIR=/bat_audio
      - DISK_WARNING_GB=${DISK_WARNING_GB:-170}
      - DISK_HARD_CAP_GB=${DISK_HARD_CAP_GB:-180}
      - DISK_TARGET_FREE_GB=${DISK_TARGET_FREE_GB:-50}
      - PI_SITE=${PI_SITE:-pi01}
      - ENABLE_ONEDRIVE_SYNC=${ENABLE_ONEDRIVE_SYNC:-false}
      - ONEDRIVE_REMOTE_NAME=${ONEDRIVE_REMOTE_NAME:-onedrive}
      - ONEDRIVE_REMOTE_BASE_PATH=${ONEDRIVE_REMOTE_BASE_PATH:-Bat Recordings from pi01}
      - ONEDRIVE_SYNC_INTERVAL_MINUTES=${ONEDRIVE_SYNC_INTERVAL_MINUTES:-60}
      - ONEDRIVE_MAX_FILES_PER_BATCH=${ONEDRIVE_MAX_FILES_PER_BATCH:-50}
    volumes:
      - ./sync-service/serviceAccountKey.json:/app/serviceAccountKey.json:ro
      - /proc/uptime:/host/uptime:ro
      - /proc/meminfo:/host/meminfo:ro
      - /proc/loadavg:/host/loadavg:ro
      - /sys/class/thermal/thermal_zone0/temp:/host/cpu_temp:ro
      - /proc/asound:/host/asound:ro
      - bat_audio:/bat_audio
      - control_flags:/control
      # rclone OAuth config from the host. Mounted read-only so the
      # container can never modify the tokens. Set up once per Pi via
      # edge/scripts/setup_rclone_onedrive.sh.
      - /home/stafa/.config/rclone:/root/.config/rclone:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soundscape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hobo-ble-service:
    build: ./hobo-ble-service
    privileged: true
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=localhost
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - HOBO_MODEL=${HOBO_MODEL:-MX2201}
      - HOBO_POLL_INTERVAL=${HOBO_POLL_INTERVAL:-30}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  analysis-api:
    build:
      context: ..
      dockerfile: edge/analysis-api/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DETECTION_THRESHOLD=0.3
      - ENABLE_GROUPS_CLASSIFIER=${ENABLE_GROUPS_CLASSIFIER:-false}
      - MODEL_PATH=/app/models/groups_model.pt
      - MODEL_VERSION=${MODEL_VERSION:-groups_v1_post_epfu_partial_2026-04-17}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  audio_lock:
  bat_audio:
  control_flags:
