services:
  ast-service:
    # Disabled — AST produces ~5 AudioSet labels per sample, the main
    # source of Firestore write-quota pressure. We no longer use the
    # "Acoustic Environment" dashboard section it feeds. Re-enable by
    # running `docker compose --profile ast up -d ast-service`.
    profiles: ["ast"]
    build: ./ast-service
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DEVICE_NAME=AudioMoth
      - SAMPLE_RATE=256000
    volumes:
      - audio_lock:/locks
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  batdetect-service:
    build:
      context: ..
      dockerfile: edge/batdetect-service/Dockerfile
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DEVICE_NAME=AudioMoth
      # AudioMoth captures natively at 384 kHz (firmware 1.9.1). We ask
      # ALSA for 256 kHz so plughw does a single clean resample down to
      # BatDetect2's target_samp_rate (256 kHz). Setting this to 384000
      # would force BatDetect2 to do its own resample, an extra step for
      # no gain — all bat calls of interest are <120 kHz.
      - SAMPLE_RATE=256000
      # BatDetect2 threshold — lowered 2026-04-23 from 0.5 to 0.3
      # after the 005517.wav false-negative experiment. UK-trained
      # BatDetect2 is systematically under-confident on NA bats; 0.5
      # dropped real passes outright. Downstream gates (min_pred_conf
      # 0.6 + FM-sweep shape filter + audio-level validator) absorb
      # the extra out-of-distribution noise. See DETECTION_TUNING_PLAYBOOK.md
      # and bat_pipeline.py CLASSIFIER_TRAINING_DET_THRESHOLD comment.
      - DETECTION_THRESHOLD=0.3
      - MIN_PREDICTION_CONF=${MIN_PREDICTION_CONF:-0.6}
      - SEGMENT_DURATION=15
      - HPF_ENABLED=${HPF_ENABLED:-true}
      - HPF_CUTOFF_HZ=${HPF_CUTOFF_HZ:-16000}
      - HPF_ORDER=${HPF_ORDER:-4}
      # Audio-level validator — final sanity check. Rejects segments
      # where the classifier confidently picked a class but the audio
      # itself is silence / broadband noise (e.g. the 0.0012-RMS file
      # that got through on 2026-04-20).
      - VALIDATOR_ENABLED=${VALIDATOR_ENABLED:-true}
      - VALIDATOR_MIN_RMS=${VALIDATOR_MIN_RMS:-0.005}
      - VALIDATOR_MIN_SNR_DB=${VALIDATOR_MIN_SNR_DB:-10.0}
      - VALIDATOR_MIN_BURST_RATIO=${VALIDATOR_MIN_BURST_RATIO:-3.0}
      # Per-detection FM-sweep + low-band shape filter (4th gate).
      # Rejects broadband clicks that otherwise fool the classifier.
      - FM_SWEEP_ENABLED=${FM_SWEEP_ENABLED:-true}
      - FM_SWEEP_MIN_SLOPE=${FM_SWEEP_MIN_SLOPE:--0.1}
      - FM_SWEEP_MAX_LOW_BAND_RATIO=${FM_SWEEP_MAX_LOW_BAND_RATIO:-0.5}
      - FM_SWEEP_MIN_R2=${FM_SWEEP_MIN_R2:-0.2}
      # Diagnostic save: when BatDetect2 passed its threshold but a
      # downstream gate (classifier/validator/FM-sweep) rejected the
      # segment, write the raw WAV to /bat_audio/_diagnostic/ for
      # forensic review. Filename encodes the rejection reason.
      - DIAGNOSTIC_SAVE_REJECTIONS=${DIAGNOSTIC_SAVE_REJECTIONS:-false}
      - UPLOAD_BAT_AUDIO=false
      - ENABLE_GROUPS_CLASSIFIER=${ENABLE_GROUPS_CLASSIFIER:-false}
      - MODEL_PATH=/app/models/groups_model.pt
      - MODEL_VERSION=${MODEL_VERSION:-groups_v1_post_epfu_partial_2026-04-17}
      - ENABLE_STORAGE_TIERING=${ENABLE_STORAGE_TIERING:-false}
      - PI_SITE=${PI_SITE:-pi01}
    volumes:
      - audio_lock:/locks
      - bat_audio:/bat_audio
      - control_flags:/control
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  sync-service:
    build: ./sync-service
    devices:
      # VideoCore I/O for vcgencmd (Pi 5 power/throttling queries).
      - /dev/vcio:/dev/vcio
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - SYNC_INTERVAL=60
      - SAMPLE_RATE=256000
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=bat-edge-monitor.firebasestorage.app
      - UPLOAD_BAT_AUDIO=false
      - BAT_AUDIO_DIR=/bat_audio
      - DISK_WARNING_GB=${DISK_WARNING_GB:-170}
      - DISK_HARD_CAP_GB=${DISK_HARD_CAP_GB:-180}
      - DISK_TARGET_FREE_GB=${DISK_TARGET_FREE_GB:-50}
      - PI_SITE=${PI_SITE:-pi01}
      - ENABLE_ONEDRIVE_SYNC=${ENABLE_ONEDRIVE_SYNC:-false}
      - ONEDRIVE_REMOTE_NAME=${ONEDRIVE_REMOTE_NAME:-onedrive}
      - ONEDRIVE_REMOTE_BASE_PATH=${ONEDRIVE_REMOTE_BASE_PATH:-Bat Recordings from pi01}
      - ONEDRIVE_SYNC_INTERVAL_MINUTES=${ONEDRIVE_SYNC_INTERVAL_MINUTES:-60}
      - ONEDRIVE_MAX_FILES_PER_BATCH=${ONEDRIVE_MAX_FILES_PER_BATCH:-50}
      # Daily summary email — one rollup per UTC day. Disabled by
      # default; set ENABLE_DAILY_SUMMARY=true in .env plus GMAIL
      # credentials (see daily_summary.py docstring).
      - ENABLE_DAILY_SUMMARY=${ENABLE_DAILY_SUMMARY:-false}
      - DAILY_SUMMARY_HOUR_UTC=${DAILY_SUMMARY_HOUR_UTC:-11}
      - DAILY_SUMMARY_RECIPIENTS=${DAILY_SUMMARY_RECIPIENTS:-}
      - DAILY_SUMMARY_WINDOW_HOURS=${DAILY_SUMMARY_WINDOW_HOURS:-24}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
    volumes:
      - ./sync-service/serviceAccountKey.json:/app/serviceAccountKey.json:ro
      - /proc/uptime:/host/uptime:ro
      - /proc/meminfo:/host/meminfo:ro
      - /proc/loadavg:/host/loadavg:ro
      - /sys/class/thermal/thermal_zone0/temp:/host/cpu_temp:ro
      - /proc/asound:/host/asound:ro
      # vcgencmd for Pi 5 power/throttling diagnostics. The binary is
      # bind-mounted from the host (it's statically linked enough to
      # run inside python:3.11-slim). Needs /dev/vcio to talk to the
      # VideoCore firmware.
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro
      - bat_audio:/bat_audio
      - control_flags:/control
      # rclone OAuth config from the host. Mounted read-only so the
      # container can never modify the tokens. Set up once per Pi via
      # edge/scripts/setup_rclone_onedrive.sh.
      - /home/stafa/.config/rclone:/root/.config/rclone:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soundscape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hobo-ble-service:
    build: ./hobo-ble-service
    privileged: true
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=localhost
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - HOBO_MODEL=${HOBO_MODEL:-MX2201}
      - HOBO_POLL_INTERVAL=${HOBO_POLL_INTERVAL:-30}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  analysis-api:
    # RETIRED — offline WAV analysis now runs in a Firebase Cloud
    # Function (functions/main.py, triggered on uploadJobs doc create).
    # See OFFLINE_WAV_ANALYSIS.md. The code here still works as a
    # fallback polling worker; re-enable by running:
    #   docker compose --profile legacy-upload-worker up -d analysis-api
    # Useful if you want to run the worker on the Pi while the cloud
    # function is being debugged.
    profiles: ["legacy-upload-worker"]
    build:
      context: ..
      dockerfile: edge/analysis-api/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=soundscape
      - DB_USER=postgres
      - DB_PASSWORD=changeme
      - DETECTION_THRESHOLD=0.3
      - ENABLE_GROUPS_CLASSIFIER=${ENABLE_GROUPS_CLASSIFIER:-false}
      - MODEL_PATH=/app/models/groups_model.pt
      - MODEL_VERSION=${MODEL_VERSION:-groups_v1_post_epfu_partial_2026-04-17}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-bat-edge-monitor.firebasestorage.app}
      - UPLOAD_POLL_INTERVAL_SEC=${UPLOAD_POLL_INTERVAL_SEC:-5}
    volumes:
      # Reuses sync-service's Firebase Admin SDK credentials.
      - ./sync-service/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  audio_lock:
  bat_audio:
  control_flags:
